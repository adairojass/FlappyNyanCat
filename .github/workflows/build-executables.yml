name: Build Distributables

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build macOS app and DMG
        run: |
          chmod +x build_mac.sh build_mac_release.sh scripts/package_macos_dmg.sh
          ./build_mac_release.sh

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlappyNyanCat-macOS-app
          path: dist/FlappyNyanCat.app

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlappyNyanCat-macOS-dmg
          path: dist/FlappyNyanCat-macOS.dmg

  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build Windows app
        run: python scripts/build.py

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\FlappyNyanCat.iss'

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlappyNyanCat-Windows-portable
          path: dist/FlappyNyanCat

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlappyNyanCat-Windows-Setup
          path: dist/FlappyNyanCat-Setup-Windows.exe
